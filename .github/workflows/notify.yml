name: Schedule Notifier

on:
  schedule:
    # 毎分実行（UTC）
    - cron: '* * * * *'
  workflow_dispatch: # 手動実行も可能

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Call cron API
        run: |
          curl -s -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://life-timer-nine.vercel.app/api/cron
