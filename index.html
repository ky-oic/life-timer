<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIFEFLOW — 生活タイマー</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #e8ff47;
    --accent2: #47ffe8;
    --accent3: #ff6b47;
    --text: #f0f0f5;
    --text-muted: #6b6b80;
    --text-dim: #3a3a4a;
    --danger: #ff4747;
    --success: #47ff8a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 60px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: 0.1em;
    color: var(--accent);
  }
  .logo span { color: var(--text-muted); font-weight: 400; font-size: 13px; margin-left: 8px; font-family: 'DM Mono', monospace; }

  .header-clock {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    color: var(--text);
    letter-spacing: 0.05em;
  }
  .header-clock .date { font-size: 11px; color: var(--text-muted); text-align: right; margin-top: 2px; }

  .hamburger {
    width: 36px; height: 36px;
    cursor: pointer;
    display: flex; flex-direction: column;
    justify-content: center; gap: 6px;
    padding: 4px;
  }
  .hamburger span {
    display: block; height: 2px;
    background: var(--text);
    transition: all 0.3s ease;
    transform-origin: center;
  }
  .hamburger.open span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

  .drawer {
    position: fixed;
    top: 60px; left: 0;
    width: 260px; height: calc(100vh - 60px);
    background: var(--surface);
    border-right: 1px solid var(--border);
    z-index: 90;
    transform: translateX(-100%);
    transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    padding: 24px 0;
  }
  .drawer.open { transform: translateX(0); }

  .drawer-item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 24px;
    cursor: pointer;
    transition: background 0.2s;
    border-left: 3px solid transparent;
    font-size: 14px;
    color: var(--text-muted);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 400;
  }
  .drawer-item:hover { background: var(--surface2); color: var(--text); }
  .drawer-item.active {
    border-left-color: var(--accent);
    color: var(--accent);
    background: rgba(232,255,71,0.05);
  }
  .drawer-item .icon { font-size: 18px; width: 24px; text-align: center; }

  .drawer-overlay {
    position: fixed; inset: 0;
    z-index: 80;
    background: rgba(0,0,0,0.5);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .drawer-overlay.open { opacity: 1; pointer-events: all; }

  main {
    margin-top: 60px;
    padding: 24px;
    min-height: calc(100vh - 60px);
  }

  .page { display: none; animation: fadeIn 0.3s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 24px;
    color: var(--text);
    margin-bottom: 24px;
    display: flex; align-items: center; gap: 12px;
  }
  .section-title::before {
    content: '';
    display: block; width: 4px; height: 28px;
    background: var(--accent);
    border-radius: 2px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }

  input[type="text"], input[type="time"], input[type="date"], input[type="number"], textarea, select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 8px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  input[type="time"], input[type="date"] { color-scheme: dark; }
  label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; display: block; letter-spacing: 0.08em; text-transform: uppercase; }

  .btn {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--accent); color: #0d0d0f; }
  .btn-primary:hover { background: #d4eb3c; transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--text-muted); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-danger:hover { background: var(--danger); color: white; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  .add-schedule-form {
    display: grid;
    grid-template-columns: 1fr 1fr 2fr auto;
    gap: 10px;
    align-items: end;
    margin-bottom: 20px;
  }

  .schedule-list { display: flex; flex-direction: column; gap: 8px; }

  .schedule-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 16px;
    transition: border-color 0.2s;
    position: relative;
    overflow: hidden;
  }
  .schedule-item.active-event {
    border-color: var(--accent);
    background: rgba(232,255,71,0.04);
  }
  .schedule-item.active-event::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
  }
  .schedule-item.past-event { opacity: 0.45; }

  .schedule-time {
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    color: var(--accent);
    min-width: 52px;
  }
  .schedule-label { flex: 1; font-size: 14px; }
  .schedule-category {
    font-size: 11px; padding: 3px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }
  .cat-work { border-color: var(--accent); color: var(--accent); }
  .cat-meal { border-color: var(--accent2); color: var(--accent2); }
  .cat-exercise { border-color: var(--accent3); color: var(--accent3); }
  .cat-rest { border-color: #a47fff; color: #a47fff; }

  .timer-display {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .timer-display::after {
    content: '';
    position: absolute; bottom: 0; left: 0;
    height: 3px;
    background: var(--accent);
    transition: width 1s linear;
  }
  .timer-now-label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
  .timer-event-name { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .timer-countdown {
    font-family: 'DM Mono', monospace;
    font-size: 48px;
    color: var(--accent);
    letter-spacing: 0.02em;
    line-height: 1;
  }
  .timer-next { font-size: 12px; color: var(--text-muted); margin-top: 10px; }

  .tabs {
    display: flex; gap: 4px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 20px;
    width: fit-content;
  }
  .tab {
    padding: 8px 20px; border-radius: 7px;
    cursor: pointer; font-size: 13px;
    color: var(--text-muted);
    transition: all 0.2s;
  }
  .tab.active { background: var(--surface); color: var(--text); }

  .add-item-form {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr auto;
    gap: 10px; align-items: end;
    margin-bottom: 20px;
  }

  .inventory-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
  }

  .inv-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    position: relative;
    transition: border-color 0.2s;
  }
  .inv-item:hover { border-color: var(--text-dim); }
  .inv-item.low-stock { border-color: var(--danger); }
  .inv-item.low-stock::after {
    content: '残り少';
    position: absolute; top: 8px; right: 8px;
    background: var(--danger);
    color: white;
    font-size: 9px; padding: 2px 6px;
    border-radius: 10px;
    font-family: 'DM Mono', monospace;
  }
  .inv-item-name { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
  .inv-item-qty {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    color: var(--accent2);
  }
  .inv-item-unit { font-size: 11px; color: var(--text-muted); margin-left: 4px; }
  .inv-item-actions {
    display: flex; gap: 4px; margin-top: 10px;
    align-items: center;
  }
  .qty-btn {
    width: 28px; height: 28px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .qty-btn:hover { background: var(--border); }
  .inv-delete {
    margin-left: auto;
    width: 24px; height: 24px;
    background: transparent;
    border: none; color: var(--text-dim);
    cursor: pointer; border-radius: 4px;
    font-size: 14px; transition: color 0.2s;
  }
  .inv-delete:hover { color: var(--danger); }

  .low-stock-banner {
    background: rgba(255,71,71,0.08);
    border: 1px solid rgba(255,71,71,0.3);
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 16px;
    font-size: 13px;
    color: #ff8a8a;
    display: none;
  }
  .low-stock-banner.visible { display: block; }

  .memo-layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 16px;
    height: calc(100vh - 140px);
  }

  .memo-sidebar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .memo-sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em;
  }
  .memo-list { flex: 1; overflow-y: auto; }
  .memo-list-item {
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .memo-list-item:hover { background: var(--surface2); }
  .memo-list-item.active { background: rgba(232,255,71,0.06); border-left: 2px solid var(--accent); }
  .memo-list-item-title { font-size: 13px; font-weight: 500; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .memo-list-item-preview { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .memo-list-item-date { font-size: 10px; color: var(--text-dim); margin-top: 4px; font-family: 'DM Mono', monospace; }

  .memo-editor {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .memo-editor-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; gap: 8px; align-items: center;
  }
  .memo-title-input {
    flex: 1;
    background: transparent;
    border: none !important;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    padding: 4px 0 !important;
  }
  .memo-title-input:focus { outline: none; }
  .memo-body {
    flex: 1;
    background: transparent;
    border: none !important;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    line-height: 1.8;
    resize: none;
    padding: 20px !important;
    outline: none;
  }
  .memo-body::placeholder { color: var(--text-dim); }
  .memo-footer {
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; color: var(--text-dim); font-family: 'DM Mono', monospace;
  }

  .notification {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 16px 20px;
    max-width: 320px;
    z-index: 200;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .notification.show { transform: translateY(0); opacity: 1; }
  .notif-title { font-size: 13px; font-weight: 500; color: var(--accent); margin-bottom: 4px; }
  .notif-body { font-size: 12px; color: var(--text-muted); }

  .empty-state { text-align: center; padding: 48px 24px; color: var(--text-dim); }
  .empty-state-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state-text { font-size: 14px; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  @media (max-width: 600px) {
    .add-schedule-form { grid-template-columns: 1fr 1fr; }
    .add-schedule-form .btn { grid-column: span 2; }
    .add-item-form { grid-template-columns: 1fr 1fr; }
    .memo-layout { grid-template-columns: 1fr; }
    .memo-sidebar { display: none; }
  }
</style>
</head>
<body>

<div class="notification" id="notification">
  <div class="notif-title" id="notif-title">&#x23F0; 時刻です</div>
  <div class="notif-body" id="notif-body"></div>
</div>

<header>
  <div class="hamburger" id="hamburger" onclick="toggleDrawer()">
    <span></span><span></span><span></span>
  </div>
  <div class="logo">LIFEFLOW <span>生活タイマー</span></div>
  <div class="header-clock">
    <div id="clock-time">--:--:--</div>
    <div class="date" id="clock-date"></div>
  </div>
</header>

<div class="drawer-overlay" id="overlay" onclick="toggleDrawer()"></div>

<div class="drawer" id="drawer">
  <div class="drawer-item active" data-page="schedule" onclick="switchPage('schedule')">
    <span class="icon">&#x23F1;</span> スケジュール
  </div>
  <div class="drawer-item" data-page="inventory" onclick="switchPage('inventory')">
    <span class="icon">&#x1F4E6;</span> 在庫管理
  </div>
  <div class="drawer-item" data-page="memo" onclick="switchPage('memo')">
    <span class="icon">&#x1F4DD;</span> メモ帳
  </div>
</div>

<main>

  <div class="page active" id="page-schedule">
    <div class="section-title">スケジュールタイマー</div>
    <div class="timer-display" id="timer-display">
      <div class="timer-now-label">現在のイベント</div>
      <div class="timer-event-name" id="timer-event-name">スケジュールを追加してください</div>
      <div class="timer-countdown" id="timer-countdown">--:--</div>
      <div class="timer-next" id="timer-next"></div>
    </div>
    <div class="card">
      <div class="add-schedule-form">
        <div>
          <label>時刻</label>
          <input type="time" id="sch-time">
        </div>
        <div>
          <label>カテゴリ</label>
          <select id="sch-cat">
            <option value="general">一般</option>
            <option value="work">仕事</option>
            <option value="meal">食事</option>
            <option value="exercise">運動</option>
            <option value="rest">休憩</option>
          </select>
        </div>
        <div>
          <label>イベント名</label>
          <input type="text" id="sch-name" placeholder="例: 朝食、会議、散歩...">
        </div>
        <div>
          <button class="btn btn-primary" onclick="addSchedule()">+ 追加</button>
        </div>
      </div>
    </div>
    <div class="schedule-list" id="schedule-list">
      <div class="empty-state">
        <div class="empty-state-icon">&#x1F4C5;</div>
        <div class="empty-state-text">スケジュールが登録されていません</div>
      </div>
    </div>
  </div>

  <div class="page" id="page-inventory">
    <div class="section-title">在庫管理</div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('all')">すべて</div>
      <div class="tab" onclick="switchTab('food')">食材</div>
      <div class="tab" onclick="switchTab('daily')">日用品</div>
    </div>
    <div class="low-stock-banner" id="low-stock-banner">&#x26A0;&#xFE0F; 在庫が少ないアイテムがあります</div>
    <div class="card">
      <div class="add-item-form">
        <div>
          <label>アイテム名</label>
          <input type="text" id="inv-name" placeholder="例: 牛乳、シャンプー...">
        </div>
        <div>
          <label>数量</label>
          <input type="number" id="inv-qty" value="1" min="0">
        </div>
        <div>
          <label>カテゴリ</label>
          <select id="inv-cat">
            <option value="food">食材</option>
            <option value="daily">日用品</option>
          </select>
        </div>
        <div>
          <button class="btn btn-primary" onclick="addInventory()">+ 追加</button>
        </div>
      </div>
    </div>
    <div class="inventory-grid" id="inventory-grid">
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-state-icon">&#x1F4E6;</div>
        <div class="empty-state-text">アイテムがありません</div>
      </div>
    </div>
  </div>

  <div class="page" id="page-memo">
    <div class="section-title">メモ帳</div>
    <div class="memo-layout">
      <div class="memo-sidebar">
        <div class="memo-sidebar-header">
          メモ一覧
          <button class="btn btn-sm btn-primary" onclick="newMemo()">+</button>
        </div>
        <div class="memo-list" id="memo-list"></div>
      </div>
      <div class="memo-editor">
        <div class="memo-editor-header">
          <input class="memo-title-input" id="memo-title" placeholder="タイトル..." oninput="saveMemo()">
          <button class="btn btn-sm btn-danger" onclick="deleteMemo()">削除</button>
        </div>
        <textarea class="memo-body" id="memo-body" placeholder="ここにメモを入力..." oninput="saveMemo()"></textarea>
        <div class="memo-footer">
          <span id="memo-date"></span>
          <span id="memo-chars">0 文字</span>
        </div>
      </div>
    </div>
  </div>

</main>

<script>
var schedules = JSON.parse(localStorage.getItem('lf_schedules') || '[]');
var inventory = JSON.parse(localStorage.getItem('lf_inventory') || '[]');
var memos     = JSON.parse(localStorage.getItem('lf_memos')     || '[]');
var activeMemoId = null;
var invFilter = 'all';
var alreadyNotified = new Set(JSON.parse(localStorage.getItem('lf_notified') || '[]'));

function toggleDrawer() {
  document.getElementById('drawer').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
  document.getElementById('hamburger').classList.toggle('open');
}

function switchPage(page) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.drawer-item').forEach(function(i) { i.classList.remove('active'); });
  document.getElementById('page-' + page).classList.add('active');
  document.querySelector('[data-page="' + page + '"]').classList.add('active');
  if (page === 'memo') renderMemoList();
  toggleDrawer();
}

function updateClock() {
  var now = new Date();
  var hms = now.toLocaleTimeString('ja-JP', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  var date = now.toLocaleDateString('ja-JP', {year:'numeric',month:'long',day:'numeric',weekday:'short'});
  document.getElementById('clock-time').textContent = hms;
  document.getElementById('clock-date').textContent = date;
  updateTimerDisplay(now);
  checkNotifications(now);
}
setInterval(updateClock, 1000);
updateClock();

function addSchedule() {
  var time = document.getElementById('sch-time').value;
  var name = document.getElementById('sch-name').value.trim();
  var cat  = document.getElementById('sch-cat').value;
  if (!time || !name) return;
  schedules.push({ id: Date.now(), time: time, name: name, cat: cat });
  schedules.sort(function(a,b) { return a.time.localeCompare(b.time); });
  saveSchedules();
  renderScheduleList();
  document.getElementById('sch-name').value = '';
}

function removeSchedule(id) {
  schedules = schedules.filter(function(s) { return s.id !== id; });
  saveSchedules();
  renderScheduleList();
}

function saveSchedules() {
  localStorage.setItem('lf_schedules', JSON.stringify(schedules));
}

function getCurrentEventIndex(nowMin) {
  var idx = -1;
  for (var i = 0; i < schedules.length; i++) {
    var parts = schedules[i].time.split(':');
    var h = parseInt(parts[0]); var m = parseInt(parts[1]);
    if (h*60+m <= nowMin) idx = i;
  }
  return idx;
}

function renderScheduleList() {
  var el = document.getElementById('schedule-list');
  if (!schedules.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#x1F4C5;</div><div class="empty-state-text">スケジュールが登録されていません</div></div>';
    return;
  }
  var now = new Date();
  var nowMin = now.getHours()*60 + now.getMinutes();
  var catClassMap = {work:'cat-work',meal:'cat-meal',exercise:'cat-exercise',rest:'cat-rest'};
  var catLabelMap = {general:'一般',work:'仕事',meal:'食事',exercise:'運動',rest:'休憩'};
  el.innerHTML = schedules.map(function(s, idx) {
    var parts = s.time.split(':');
    var h = parseInt(parts[0]); var m = parseInt(parts[1]);
    var schMin = h*60+m;
    var isPast = schMin < nowMin;
    var isActive = !isPast && (idx === getCurrentEventIndex(nowMin));
    var catClass = catClassMap[s.cat] || '';
    var catLabel = catLabelMap[s.cat] || s.cat;
    return '<div class="schedule-item ' + (isActive?'active-event':'') + ' ' + (isPast?'past-event':'') + '">' +
      '<div class="schedule-time">' + s.time + '</div>' +
      '<div class="schedule-label">' + s.name + '</div>' +
      '<div class="schedule-category ' + catClass + '">' + catLabel + '</div>' +
      '<button class="btn btn-ghost btn-sm" onclick="removeSchedule(' + s.id + ')">&times;</button>' +
      '</div>';
  }).join('');
}

function updateTimerDisplay(now) {
  var nowMin = now.getHours()*60 + now.getMinutes();
  var nowSec = nowMin*60 + now.getSeconds();
  if (!schedules.length) return;

  var upcoming = null;
  for (var i = 0; i < schedules.length; i++) {
    var p = schedules[i].time.split(':');
    if (parseInt(p[0])*60+parseInt(p[1]) > nowMin) { upcoming = schedules[i]; break; }
  }

  var current = null;
  for (var j = 0; j < schedules.length; j++) {
    var q = schedules[j].time.split(':');
    if (parseInt(q[0])*60+parseInt(q[1]) <= nowMin) current = schedules[j];
  }

  var nameEl = document.getElementById('timer-event-name');
  var countEl = document.getElementById('timer-countdown');
  var nextEl = document.getElementById('timer-next');

  function fmt(diff) {
    var hh = Math.floor(diff/3600);
    var mm = Math.floor((diff%3600)/60);
    var ss = diff%60;
    if (hh > 0) return pad(hh)+':'+pad(mm)+':'+pad(ss);
    return pad(mm)+':'+pad(ss);
  }
  function pad(n) { return String(n).padStart(2,'0'); }

  if (current) {
    nameEl.textContent = current.name;
    if (upcoming) {
      var up = upcoming.time.split(':');
      var diff = parseInt(up[0])*3600+parseInt(up[1])*60 - nowSec;
      if (diff >= 0) {
        countEl.textContent = fmt(diff);
        nextEl.textContent = '次: ' + upcoming.time + ' ' + upcoming.name;
      }
    } else {
      countEl.textContent = '終了';
      nextEl.textContent = '本日のスケジュール終了';
    }
  } else if (upcoming) {
    nameEl.textContent = '次のイベントを待機中';
    var up2 = upcoming.time.split(':');
    var diff2 = parseInt(up2[0])*3600+parseInt(up2[1])*60 - nowSec;
    if (diff2 >= 0) {
      countEl.textContent = fmt(diff2);
      nextEl.textContent = '次: ' + upcoming.time + ' ' + upcoming.name;
    }
  }
  renderScheduleList();
}

function checkNotifications(now) {
  var key = now.toISOString().slice(0,10);
  var nowStr = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  if (now.getSeconds() !== 0) return;
  var catMsg = {general:'',work:'&#x1F4BC; 仕事',meal:'&#x1F37D; 食事',exercise:'&#x1F3C3; 運動',rest:'&#x1F634; 休憩'};
  schedules.forEach(function(s) {
    var nid = key+'_'+s.id;
    if (s.time === nowStr && !alreadyNotified.has(nid)) {
      alreadyNotified.add(nid);
      localStorage.setItem('lf_notified', JSON.stringify([...alreadyNotified]));
      showNotification('&#x23F0; ' + s.time + ' \u2014 ' + s.name, (catMsg[s.cat]||'') + ' の時間です！');
    }
  });
}

function showNotification(title, body) {
  var n = document.getElementById('notification');
  document.getElementById('notif-title').innerHTML = title;
  document.getElementById('notif-body').innerHTML = body;
  n.classList.add('show');
  setTimeout(function() { n.classList.remove('show'); }, 5000);
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(title, { body: body });
  }
}

if ('Notification' in window) Notification.requestPermission();

function addInventory() {
  var name = document.getElementById('inv-name').value.trim();
  var qty  = parseInt(document.getElementById('inv-qty').value) || 0;
  var cat  = document.getElementById('inv-cat').value;
  if (!name) return;
  inventory.push({ id: Date.now(), name: name, qty: qty, cat: cat, threshold: 2 });
  saveInventory();
  renderInventory();
  document.getElementById('inv-name').value = '';
  document.getElementById('inv-qty').value = '1';
}

function changeQty(id, delta) {
  var item = inventory.find(function(i) { return i.id === id; });
  if (!item) return;
  item.qty = Math.max(0, item.qty + delta);
  saveInventory();
  renderInventory();
}

function removeInventory(id) {
  inventory = inventory.filter(function(i) { return i.id !== id; });
  saveInventory();
  renderInventory();
}

function saveInventory() {
  localStorage.setItem('lf_inventory', JSON.stringify(inventory));
}

function switchTab(f) {
  invFilter = f;
  var tabs = ['all','food','daily'];
  document.querySelectorAll('.tab').forEach(function(t, i) {
    t.classList.toggle('active', tabs[i] === f);
  });
  renderInventory();
}

function renderInventory() {
  var grid = document.getElementById('inventory-grid');
  var filtered = invFilter === 'all' ? inventory : inventory.filter(function(i) { return i.cat === invFilter; });
  var lowItems = inventory.filter(function(i) { return i.qty <= i.threshold; });
  var banner = document.getElementById('low-stock-banner');
  banner.classList.toggle('visible', lowItems.length > 0);
  if (lowItems.length) banner.textContent = '⚠️ 在庫少: ' + lowItems.map(function(i){return i.name;}).join('、');

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">&#x1F4E6;</div><div class="empty-state-text">アイテムがありません</div></div>';
    return;
  }

  var catLabel = {food:'食材',daily:'日用品'};
  grid.innerHTML = filtered.map(function(item) {
    return '<div class="inv-item ' + (item.qty <= item.threshold ? 'low-stock' : '') + '">' +
      '<div class="inv-item-name">' + item.name + '</div>' +
      '<div style="margin-bottom:4px"><span class="inv-item-qty">' + item.qty + '</span><span class="inv-item-unit">個</span></div>' +
      '<div style="font-size:10px;color:var(--text-dim);margin-bottom:8px">' + (catLabel[item.cat]||item.cat) + '</div>' +
      '<div class="inv-item-actions">' +
      '<button class="qty-btn" onclick="changeQty(' + item.id + ',-1)">&minus;</button>' +
      '<button class="qty-btn" onclick="changeQty(' + item.id + ',1)">+</button>' +
      '<button class="inv-delete" onclick="removeInventory(' + item.id + ')">&#x1F5D1;</button>' +
      '</div></div>';
  }).join('');
}

function newMemo() {
  var m = { id: Date.now(), title: '新しいメモ', body: '', updated: new Date().toISOString() };
  memos.unshift(m);
  saveMemos();
  activeMemoId = m.id;
  renderMemoList();
  loadMemoEditor(m);
}

function deleteMemo() {
  if (!activeMemoId) return;
  memos = memos.filter(function(m) { return m.id !== activeMemoId; });
  saveMemos();
  activeMemoId = memos.length ? memos[0].id : null;
  renderMemoList();
  if (activeMemoId) loadMemoEditor(memos[0]);
  else {
    document.getElementById('memo-title').value = '';
    document.getElementById('memo-body').value = '';
    document.getElementById('memo-date').textContent = '';
    document.getElementById('memo-chars').textContent = '0 文字';
  }
}

function saveMemo() {
  if (!activeMemoId) return;
  var m = memos.find(function(m) { return m.id === activeMemoId; });
  if (!m) return;
  m.title   = document.getElementById('memo-title').value || '無題';
  m.body    = document.getElementById('memo-body').value;
  m.updated = new Date().toISOString();
  saveMemos();
  renderMemoList();
  document.getElementById('memo-date').textContent = new Date(m.updated).toLocaleString('ja-JP');
  document.getElementById('memo-chars').textContent = m.body.length + ' 文字';
}

function loadMemoEditor(m) {
  document.getElementById('memo-title').value = m.title === '新しいメモ' ? '' : m.title;
  document.getElementById('memo-body').value  = m.body;
  document.getElementById('memo-date').textContent = new Date(m.updated).toLocaleString('ja-JP');
  document.getElementById('memo-chars').textContent = m.body.length + ' 文字';
  if (m.title === '新しいメモ') document.getElementById('memo-title').focus();
}

function renderMemoList() {
  var el = document.getElementById('memo-list');
  if (!memos.length) {
    el.innerHTML = '<div style="padding:24px;text-align:center;font-size:12px;color:var(--text-dim)">メモがありません<br><br><button class="btn btn-primary btn-sm" onclick="newMemo()">+ 新規作成</button></div>';
    return;
  }
  el.innerHTML = memos.map(function(m) {
    return '<div class="memo-list-item ' + (m.id===activeMemoId?'active':'') + '" onclick="selectMemo(' + m.id + ')">' +
      '<div class="memo-list-item-title">' + (m.title||'無題') + '</div>' +
      '<div class="memo-list-item-preview">' + (m.body.slice(0,40)||'内容なし') + '</div>' +
      '<div class="memo-list-item-date">' + new Date(m.updated).toLocaleDateString('ja-JP') + '</div>' +
      '</div>';
  }).join('');
}

function selectMemo(id) {
  activeMemoId = id;
  var m = memos.find(function(m) { return m.id === id; });
  if (m) loadMemoEditor(m);
  renderMemoList();
}

function saveMemos() {
  localStorage.setItem('lf_memos', JSON.stringify(memos));
}

renderScheduleList();
renderInventory();
renderMemoList();
if (memos.length) { activeMemoId = memos[0].id; loadMemoEditor(memos[0]); }
</script>
</body>
</html>
